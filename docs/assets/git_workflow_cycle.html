
<style>
.gz {
  background:var(--color-background-secondary);
  border:0.5px solid var(--color-border-tertiary);
  border-left: 3px solid transparent;
  border-radius:var(--border-radius-lg);
  padding:12px 8px;
  text-align:center;
  font-size:12px;
  font-weight:500;
  transition:border-color .3s,background .3s;
  line-height:1.3;
}
#gz0{border-left-color:#BA7517}
#gz1{border-left-color:#0F6E56}
#gz2{border-left-color:#185FA5}
#gz3{border-left-color:#534AB7}
.gz .sub{display:block;font-size:11px;font-weight:400;color:var(--color-text-secondary);margin-top:3px}
.gz.src{border-color:#BA7517;background:var(--color-background-warning)}
.gz.dst{border-color:#0F6E56;background:var(--color-background-success)}
.gz.pass{border-color:#185FA5;background:var(--color-background-info)}
.cmd{font-family:var(--font-mono);font-size:12px;padding:5px 11px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer;transition:background .15s}
.cmd:hover{background:var(--color-background-secondary)}
.cmd.fwd{border-color:#5DCAA5;color:var(--color-text-success)}
.cmd.bwd{border-color:#85B7EB;color:var(--color-text-info)}
.cmd.sel{box-shadow:0 0 0 2px currentColor}
#info-box{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:12px 14px;font-size:13px;line-height:1.65;min-height:52px;transition:opacity .15s}
#info-box code{font-family:var(--font-mono);font-size:11px;background:var(--color-background-tertiary);padding:1px 5px;border-radius:4px}
</style>

<h2 class="sr-only">Interactive git workflow — click any git command to animate how changes move between areas</h2>
<div style="padding:.5rem 0">

<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:0" id="zones">
  <div class="gz" id="gz0">Working directory<span class="sub">your edited files</span></div>
  <div class="gz" id="gz1">Staging area<span class="sub">git index</span></div>
  <div class="gz" id="gz2">Local repository<span class="sub">commit history</span></div>
  <div class="gz" id="gz3">Remote / origin<span class="sub">GitHub · GitLab</span></div>
</div>

<svg width="100%" viewBox="0 0 640 68" style="display:block">
  <defs>
    <marker id="mf" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="mb" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M8 1L2 5L8 9" fill="none" stroke="#378ADD" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker>
  </defs>
  <line x1="28" y1="16" x2="610" y2="16" stroke="#1D9E75" stroke-width="1" marker-end="url(#mf)" opacity="0.35"/>
  <line x1="612" y1="52" x2="28" y2="52" stroke="#378ADD" stroke-width="1" marker-end="url(#mb)" opacity="0.35"/>
  <line x1="160" y1="2" x2="160" y2="66" stroke="var(--color-border-tertiary)" stroke-width="0.5" stroke-dasharray="3 3"/>
  <line x1="320" y1="2" x2="320" y2="66" stroke="var(--color-border-tertiary)" stroke-width="0.5" stroke-dasharray="3 3"/>
  <line x1="480" y1="2" x2="480" y2="66" stroke="var(--color-border-tertiary)" stroke-width="0.5" stroke-dasharray="3 3"/>
  <text x="320" y="11" text-anchor="middle" font-size="9.5" fill="#1D9E75" opacity="0.55" font-family="var(--font-mono)">add → commit → push</text>
  <text x="320" y="65" text-anchor="middle" font-size="9.5" fill="#378ADD" opacity="0.55" font-family="var(--font-mono)">fetch · pull · restore · clone</text>
  <circle id="pt" cx="-20" cy="16" r="5" fill="#1D9E75" opacity="0"/>
  <circle id="pt2" cx="-20" cy="52" r="5" fill="#378ADD" opacity="0"/>
</svg>

<div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:6px 0 4px">
  <button class="cmd fwd" onclick="runCmd('add')">git add</button>
  <button class="cmd fwd" onclick="runCmd('commit')">git commit</button>
  <button class="cmd fwd" onclick="runCmd('push')">git push</button>
</div>
<div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:0 0 10px">
  <button class="cmd bwd" onclick="runCmd('fetch')">git fetch</button>
  <button class="cmd bwd" onclick="runCmd('pull')">git pull</button>
  <button class="cmd bwd" onclick="runCmd('restore')">git restore</button>
  <button class="cmd bwd" onclick="runCmd('clone')">git clone</button>
</div>

<div id="info-box" style="color:var(--color-text-secondary);font-style:italic">
  Click any command above to see how it moves changes through the git workflow.
</div>
</div>

<script>
const ZX = [80,240,400,560];
const ZEL = [0,1,2,3].map(i=>document.getElementById('gz'+i));
const PT = document.getElementById('pt');
const PT2 = document.getElementById('pt2');
const INFO = document.getElementById('info-box');
let af=null, af2=null, selBtn=null;

const CMDS = {
  add:    {from:0,to:1,dir:'f',col:'#1D9E75',
    info:'<code>git add &lt;file&gt;</code> moves changes from your <strong>working directory</strong> into the <strong>staging area</strong> (the index). Only staged changes are included in the next commit. Use <code>git add .</code> to stage all changes, or name individual files.'},
  commit: {from:1,to:2,dir:'f',col:'#1D9E75',
    info:'<code>git commit -m "message"</code> saves a snapshot of all staged changes permanently into your <strong>local repository</strong>. This creates a new commit node in your history — safe and local until you push.'},
  push:   {from:2,to:3,dir:'f',col:'#1D9E75',
    info:'<code>git push origin main</code> uploads local commits to the <strong>remote repository</strong> (e.g. GitHub). Collaborators can now see and pull your work. Note: only committed changes are pushed — staging area contents are never sent.'},
  fetch:  {from:3,to:2,dir:'b',col:'#378ADD',
    info:'<code>git fetch origin</code> downloads commits and refs from the <strong>remote</strong> into your <strong>local repository</strong> — but does <em>not</em> touch your working files. It\'s safe to run any time. Inspect with <code>git log origin/main</code> before deciding to merge.'},
  pull:   {from:3,to:0,dir:'b',col:'#378ADD',special:'pull',
    info:'<code>git pull</code> is a two-step shortcut: <code>git fetch</code> (remote → local repo) then <code>git merge</code> (local repo → working directory). Your files are updated immediately. Equivalent to running <code>git fetch &amp;&amp; git merge</code>.'},
  restore:{from:2,to:0,dir:'b',col:'#378ADD',
    info:'<code>git restore &lt;file&gt;</code> discards working-directory changes, reverting the file to its last committed state. Use <code>git restore --staged &lt;file&gt;</code> to unstage a file (move it from staging back to working directory without losing edits).'},
  clone:  {from:3,to:0,dir:'b',col:'#7F77DD',special:'clone',
    info:'<code>git clone &lt;url&gt;</code> copies an entire <strong>remote repository</strong> — all commits, branches, and history — into a new local folder. It sets up <code>origin</code> as the remote automatically. The starting point for most projects.'},
};

function clearZ(){ZEL.forEach(e=>e.classList.remove('src','dst','pass'));}
function setInfo(html){INFO.style.opacity='0';setTimeout(()=>{INFO.innerHTML=html;INFO.style.opacity='1';},130);}

function anim(pt,fromX,toX,cy,col,dur,onDone){
  pt.setAttribute('fill',col);
  pt.setAttribute('cy',cy);
  pt.setAttribute('cx',fromX);
  pt.setAttribute('opacity','1');
  const t0=performance.now();
  let fr;
  function step(now){
    const t=Math.min((now-t0)/dur,1);
    const e=t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
    pt.setAttribute('cx',fromX+(toX-fromX)*e);
    if(t>.82)pt.setAttribute('opacity',String((1-t)/.18));
    if(t<1){fr=requestAnimationFrame(step);}
    else{pt.setAttribute('opacity','0');if(onDone)onDone();}
  }
  fr=requestAnimationFrame(step);
  return fr;
}

function runCmd(name){
  const c=CMDS[name];if(!c)return;
  if(selBtn)selBtn.classList.remove('sel');
  selBtn=document.querySelector(`.cmd[onclick="runCmd('${name}')"]`);
  if(selBtn)selBtn.classList.add('sel');
  clearZ();
  const cy=c.dir==='f'?16:52;
  const pt=c.dir==='f'?PT:PT2;
  if(c.special==='pull'){
    ZEL[3].classList.add('src');
    ZEL[2].classList.add('pass');
    ZEL[1].classList.add('pass');
    ZEL[0].classList.add('dst');
    anim(pt,ZX[3],ZX[2],cy,c.col,600,()=>{
      setTimeout(()=>anim(pt,ZX[2],ZX[0],cy,c.col,700,null),80);
    });
  } else if(c.special==='clone'){
    ZEL[3].classList.add('src');
    ZEL[2].classList.add('dst');ZEL[1].classList.add('dst');ZEL[0].classList.add('dst');
    anim(pt,ZX[3],ZX[0],cy,c.col,900,null);
  } else {
    ZEL[c.from].classList.add('src');
    ZEL[c.to].classList.add('dst');
    anim(pt,ZX[c.from],ZX[c.to],cy,c.col,700,null);
  }
  setInfo(c.info);
}
</script>
