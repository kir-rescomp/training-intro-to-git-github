site_name: Introduction to Git and Github
site_author: The Kennedy Institute of Rheumatology, NDORMS, University of Oxford
site_dir: public
site_url: "https://kir-rescomp.github.io/training-intro-to-git-github/"

#Repository information
repo_name:  kir-rescomp/training-intro-to-git-github
repo_url: https://github.com/kir-rescomp/training-intro-to-git-github


theme:
  name: material
  logo: images/kir_oxford_combined_logo.png
  favicon: images/kir_standalone_logo.png 
   # 404 page
  static_templates:
    - 404.html

  palette:

  # Palette toggle for automatic mode
  - media: "(prefers-color-scheme)"
    toggle:
      icon: material/brightness-auto
      name: Switch to light mode
    primary: custom

  # Palette toggle for light mode
  - media: "(prefers-color-scheme: light)"
    scheme: default
    primary: custom


    toggle:
      icon: material/brightness-7
      name: Switch to dark mode

  # Palette toggle for dark mode
  - media: "(prefers-color-scheme: dark)"
    scheme: slate
    toggle:
      icon: material/brightness-4
      name: Switch to system preference
    primary: custom
  
  features:
    - navigation.tracking
#    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
#    - navigation.tabs
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.code.annotation
    - content.action.edit
    - content.action.view
    - search.suggest
    - search.highlight
    - toc.follow


  # Necessary for search to work properly
  include_search_page: false
  search_index_only: true

  # Default values, taken from mkdocs_theme.yml
  language: en
  font:
    text: Mukta
    code: Inconsolata

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - meta
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:materialx.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: squidfunk
      repo: mkdocs-material
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.snippets
  - pymdownx.blocks.caption
  - pymdownx.critic

plugins: 
  - glightbox:
      effect: zoom
      zoomable: true
  - search:
      lang: en
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - tags


extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

copyright : KIR "Introduction to Git and Github" is licensed under a <a rel="noopener" target="_blank" href="https://www.gnu.org/licenses/gpl-3.0.en.html">GNU General Public License v3.0</a>


extra_css:
  - stylesheets/extra.css
  - stylesheets/catalogue-return-button.css
  - stylesheets/side_bar_menu.css
  - stylesheets/adjust_grid_gaps.css

nav: 
  - Home: index.md
  - Introduction to Version Control: 1.what_is_versioncontrol.md
  - Introduction to Git: 2.intro_to_git.md
  - Setting up Git: 3.setting_up_git.md
  - Git Concepts, Data Model and Commands: 4.git_model_commands.md
  - From Local Collaborative - Introduction to Github: 5.from_git_to_github.md
  - Resolving Merge Conflicts: 6.conflicts.md
  - Learn about Licensing: 7.licensing.md
  - Credentials:
    - Overview: credentials/1.credentials.md
    - SSH keys: credentials/2.setting_up_ssh_keys.md
    - GH Tokens: credentials/3.tokens.md

  - Git Quiz: 8.git_quiz.md

  - Supplementary: 
    - Git Workflow & Cycle: supplementary/0.1.git_workflow_cycle.md
    - Github Actions: supplementary/1.github_actions.md
    - Forking: supplementary/2.forking.md
    - Issues and Bug Tracking: supplementary/3.issues_and_bug_tracking.md
    - Readme, Documentation and Citation: supplementary/4.readme_documentation_citation.md
    - Releases and Versioning: supplementary/5.releases_and_versioning.md
    - Real World Scenarios: supplementary/6.real_world_scenarios.md
    - Github Workflow: supplementary/7.git_workflow_diagram.md