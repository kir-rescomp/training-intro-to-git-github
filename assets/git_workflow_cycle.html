<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Git workflow cycle</title>
<style>
  /* ── design tokens ───────────────────────────────────────────────────── */
  :root {
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    --font-mono: "SFMono-Regular", "SF Mono", "Fira Code", "Fira Mono", "Roboto Mono",
                 Menlo, Monaco, Consolas, "Liberation Mono", monospace;

    --bg:          #ffffff;
    --bg-2:        #f4f3ef;
    --bg-3:        #eceae4;
    --bg-warn:     #faeeda;
    --bg-success:  #eaf3de;
    --bg-info:     #e6f1fb;

    --text:        #1a1a18;
    --text-2:      #6b6b67;
    --text-warn:   #633806;
    --text-success:#27500a;
    --text-info:   #0c447c;

    --border:      rgba(0,0,0,0.12);
    --border-2:    rgba(0,0,0,0.22);
    --bd-warn:     #BA7517;
    --bd-success:  #1D9E75;
    --bd-info:     #185FA5;

    --radius:      10px;
    --radius-sm:   6px;

    /* zone identity colours */
    --z0: #BA7517;
    --z1: #0F6E56;
    --z2: #185FA5;
    --z3: #534AB7;

    /* particle / track colours */
    --track-fwd: #1D9E75;
    --track-bwd: #378ADD;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg:          #1c1c1a;
      --bg-2:        #282825;
      --bg-3:        #333330;
      --bg-warn:     #412402;
      --bg-success:  #173404;
      --bg-info:     #042c53;

      --text:        #e8e6de;
      --text-2:      #999890;
      --text-warn:   #FAC775;
      --text-success:#C0DD97;
      --text-info:   #B5D4F4;

      --border:      rgba(255,255,255,0.10);
      --border-2:    rgba(255,255,255,0.20);
      --bd-warn:     #EF9F27;
      --bd-success:  #5DCAA5;
      --bd-info:     #85B7EB;

      --z0: #EF9F27;
      --z1: #5DCAA5;
      --z2: #85B7EB;
      --z3: #AFA9EC;

      --track-fwd: #5DCAA5;
      --track-bwd: #85B7EB;
    }
  }

  /* ── reset / base ────────────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-sans);
    font-size: 13px;
    background: var(--bg);
    color: var(--text);
    padding: 14px 16px 16px;
    line-height: 1.5;
  }

  /* ── zone cards ──────────────────────────────────────────────────────── */
  #zones {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }

  .gz {
    background: var(--bg-2);
    border: 0.5px solid var(--border);
    border-left: 3px solid transparent;
    border-radius: var(--radius);
    padding: 10px 6px 10px;
    text-align: center;
    transition: border-color .25s, background .25s;
    user-select: none;
  }
  #gz0 { border-left-color: var(--z0); }
  #gz1 { border-left-color: var(--z1); }
  #gz2 { border-left-color: var(--z2); }
  #gz3 { border-left-color: var(--z3); }

  .gz-name {
    display: block;
    font-weight: 600;
    font-size: 12px;
    color: var(--text);
    line-height: 1.3;
  }
  .gz-sub {
    display: block;
    font-size: 10.5px;
    color: var(--text-2);
    margin-top: 3px;
  }

  .gz.src  { border-color: var(--bd-warn);    background: var(--bg-warn);    }
  .gz.dst  { border-color: var(--bd-success); background: var(--bg-success); }
  .gz.pass { border-color: var(--bd-info);    background: var(--bg-info);    }

  /* ── svg track ───────────────────────────────────────────────────────── */
  #track { display: block; width: 100%; margin: 0; overflow: visible; }

  /* ── command buttons ─────────────────────────────────────────────────── */
  .btn-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
  }
  .btn-row + .btn-row { margin-top: 5px; }

  .cmd {
    font-family: var(--font-mono);
    font-size: 11.5px;
    font-weight: 500;
    padding: 5px 12px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border-2);
    background: var(--bg);
    color: var(--text);
    cursor: pointer;
    transition: background .14s, box-shadow .14s;
    line-height: 1;
  }
  .cmd:hover  { background: var(--bg-2); }
  .cmd:active { transform: scale(0.97); }

  .cmd.fwd { border-color: var(--bd-success); color: var(--text-success); }
  .cmd.bwd { border-color: var(--bd-info);    color: var(--text-info);    }

  .cmd.sel { box-shadow: 0 0 0 2px currentColor; }

  /* ── info box ────────────────────────────────────────────────────────── */
  #info-box {
    background: var(--bg-2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 12.5px;
    line-height: 1.65;
    color: var(--text-2);
    font-style: italic;
    transition: opacity .15s;
    margin-top: 8px;
  }
  #info-box.has-content {
    color: var(--text);
    font-style: normal;
  }
  #info-box code {
    font-family: var(--font-mono);
    font-size: 11px;
    background: var(--bg-3);
    padding: 1px 5px;
    border-radius: 4px;
  }
  #info-box strong { font-weight: 600; }
  #info-box em     { font-style: italic; }
</style>
</head>
<body>

<h2 style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">
  Interactive git workflow — click any command to animate how changes move between areas
</h2>

<!-- Zone cards -->
<div id="zones">
  <div class="gz" id="gz0"><span class="gz-name">Working directory</span><span class="gz-sub">your edited files</span></div>
  <div class="gz" id="gz1"><span class="gz-name">Staging area</span><span class="gz-sub">git index</span></div>
  <div class="gz" id="gz2"><span class="gz-name">Local repository</span><span class="gz-sub">commit history</span></div>
  <div class="gz" id="gz3"><span class="gz-name">Remote / origin</span><span class="gz-sub">GitHub · GitLab</span></div>
</div>

<!-- Animated track -->
<svg id="track" viewBox="0 0 640 66">
  <defs>
    <marker id="mf" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="mb" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="5" markerHeight="5"
            orient="auto-start-reverse">
      <path d="M8 1L2 5L8 9" fill="none" stroke="#378ADD" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- forward / backward guide lines -->
  <line x1="24" y1="15" x2="614" y2="15" stroke="#1D9E75" stroke-width="1"
        marker-end="url(#mf)" opacity="0.30"/>
  <line x1="616" y1="51" x2="24" y2="51" stroke="#378ADD" stroke-width="1"
        marker-end="url(#mb)" opacity="0.30"/>

  <!-- zone dividers -->
  <line x1="160" y1="2" x2="160" y2="64" stroke-dasharray="3 3" stroke-width="0.5" class="divider"/>
  <line x1="320" y1="2" x2="320" y2="64" stroke-dasharray="3 3" stroke-width="0.5" class="divider"/>
  <line x1="480" y1="2" x2="480" y2="64" stroke-dasharray="3 3" stroke-width="0.5" class="divider"/>

  <!-- direction labels -->
  <text id="lbl-fwd" x="320" y="10" text-anchor="middle" font-size="9"
        fill="#1D9E75" opacity="0.5" font-family="SFMono-Regular,SF Mono,Fira Code,monospace">add → commit → push</text>
  <text id="lbl-bwd" x="320" y="64" text-anchor="middle" font-size="9"
        fill="#378ADD" opacity="0.5" font-family="SFMono-Regular,SF Mono,Fira Code,monospace">fetch · pull · restore · clone</text>

  <!-- animated particles (hidden until a command runs) -->
  <circle id="pt"  cx="-20" cy="15" r="5" fill="#1D9E75" opacity="0"/>
  <circle id="pt2" cx="-20" cy="51" r="5" fill="#378ADD" opacity="0"/>
</svg>

<!-- Command buttons -->
<div class="btn-row">
  <button class="cmd fwd" onclick="runCmd('add')">git add</button>
  <button class="cmd fwd" onclick="runCmd('commit')">git commit</button>
  <button class="cmd fwd" onclick="runCmd('push')">git push</button>
</div>
<div class="btn-row" style="margin-top:5px">
  <button class="cmd bwd" onclick="runCmd('fetch')">git fetch</button>
  <button class="cmd bwd" onclick="runCmd('pull')">git pull</button>
  <button class="cmd bwd" onclick="runCmd('restore')">git restore</button>
  <button class="cmd bwd" onclick="runCmd('clone')">git clone</button>
</div>

<!-- Info panel -->
<div id="info-box">
  Click any command above to see how it moves changes through the git workflow.
</div>

<script>
/* ── zone x-centres in SVG viewBox (0..640, 4 equal zones of 160px) ── */
const ZX = [80, 240, 400, 560];
const ZEL = [0,1,2,3].map(i => document.getElementById('gz'+i));
const PT  = document.getElementById('pt');
const PT2 = document.getElementById('pt2');
const INFO = document.getElementById('info-box');

/* SVG divider colour synced to CSS */
document.querySelectorAll('.divider').forEach(el => {
  el.setAttribute('stroke', getComputedStyle(document.documentElement)
    .getPropertyValue('--border').trim() || 'rgba(0,0,0,0.15)');
});

let selBtn = null, af = null;

/* ── command data ─────────────────────────────────────────────────── */
const CMDS = {
  add: {
    from:0, to:1, dir:'f', col:'#1D9E75',
    html:`<code>git add &lt;file&gt;</code> moves changes from your <strong>working directory</strong>
into the <strong>staging area</strong> (the index).<br><br>
Only staged changes are included in the next commit.<br>
Use <code>git add .</code> to stage all tracked changes, or <code>git add&nbsp;-p</code> to stage hunks interactively.`
  },
  commit: {
    from:1, to:2, dir:'f', col:'#1D9E75',
    html:`<code>git commit -m "message"</code> saves a snapshot of all staged changes permanently
into your <strong>local repository</strong>.<br><br>
Creates a new commit node in your history — local and safe until you push.<br>
Each commit gets a unique SHA hash you can reference later.`
  },
  push: {
    from:2, to:3, dir:'f', col:'#1D9E75',
    html:`<code>git push origin main</code> uploads local commits to the <strong>remote
repository</strong> (e.g.&nbsp;GitHub).<br><br>
Collaborators can now see and pull your work.<br>
Only <em>committed</em> changes are sent — the staging area is never pushed.`
  },
  fetch: {
    from:3, to:2, dir:'b', col:'#378ADD',
    html:`<code>git fetch origin</code> downloads new commits and refs from the <strong>remote</strong>
into your <strong>local repository</strong>, but does <em>not</em> update your working files.<br><br>
Safe to run at any time. Inspect with <code>git log origin/main</code> before deciding to merge.`
  },
  pull: {
    from:3, to:0, dir:'b', col:'#378ADD', special:'pull',
    html:`<code>git pull</code> is a two-step shortcut:<br>
&nbsp;&nbsp;1. <code>git fetch</code> — remote → local repo<br>
&nbsp;&nbsp;2. <code>git merge</code> — local repo → working directory<br><br>
Your working files update immediately.<br>
Equivalent to running <code>git fetch &amp;&amp; git merge</code>.`
  },
  restore: {
    from:2, to:0, dir:'b', col:'#378ADD',
    html:`<code>git restore &lt;file&gt;</code> discards changes in your working directory,
reverting the file to its last committed state.<br><br>
Use <code>git restore --staged &lt;file&gt;</code> to <em>unstage</em> a file
(moves it back to working dir without losing your edits).`
  },
  clone: {
    from:3, to:0, dir:'b', col:'#7F77DD', special:'clone',
    html:`<code>git clone &lt;url&gt;</code> copies an entire remote repository — all commits,
branches, and history — into a new local folder.<br><br>
Sets up <code>origin</code> as the remote automatically.<br>
The starting point for most projects.`
  },
};

/* ── zone highlight helpers ───────────────────────────────────────── */
function clearZones() {
  ZEL.forEach(el => el.classList.remove('src','dst','pass'));
}

/* ── particle animation ───────────────────────────────────────────── */
function animPt(pt, fromX, toX, cy, col, dur, onDone) {
  pt.setAttribute('fill', col);
  pt.setAttribute('cy', cy);
  pt.setAttribute('cx', fromX);
  pt.setAttribute('opacity', '1');
  const t0 = performance.now();
  function step(now) {
    const t = Math.min((now - t0) / dur, 1);
    const e = t < .5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
    pt.setAttribute('cx', fromX + (toX - fromX) * e);
    if (t > .82) pt.setAttribute('opacity', String((1-t)/.18));
    if (t < 1) { af = requestAnimationFrame(step); }
    else { pt.setAttribute('opacity','0'); if(onDone) onDone(); }
  }
  if (af) cancelAnimationFrame(af);
  af = requestAnimationFrame(step);
}

/* ── info panel ───────────────────────────────────────────────────── */
function setInfo(html) {
  INFO.style.opacity = '0';
  setTimeout(() => {
    INFO.innerHTML = html;
    INFO.classList.add('has-content');
    INFO.style.opacity = '1';
  }, 130);
}

/* ── main command handler ─────────────────────────────────────────── */
function runCmd(name) {
  const c = CMDS[name];
  if (!c) return;

  if (selBtn) selBtn.classList.remove('sel');
  selBtn = document.querySelector(`.cmd[onclick="runCmd('${name}')"]`);
  if (selBtn) selBtn.classList.add('sel');

  clearZones();
  const cy  = c.dir === 'f' ? 15 : 51;
  const pt  = c.dir === 'f' ? PT : PT2;

  if (c.special === 'pull') {
    ZEL[3].classList.add('src');
    ZEL[2].classList.add('pass');
    ZEL[1].classList.add('pass');
    ZEL[0].classList.add('dst');
    animPt(pt, ZX[3], ZX[2], cy, c.col, 600, () =>
      setTimeout(() => animPt(pt, ZX[2], ZX[0], cy, c.col, 700, null), 80));
  } else if (c.special === 'clone') {
    ZEL[3].classList.add('src');
    ZEL[2].classList.add('dst');
    ZEL[1].classList.add('dst');
    ZEL[0].classList.add('dst');
    animPt(pt, ZX[3], ZX[0], cy, c.col, 900, null);
  } else {
    ZEL[c.from].classList.add('src');
    ZEL[c.to].classList.add('dst');
    animPt(pt, ZX[c.from], ZX[c.to], cy, c.col, 700, null);
  }

  setInfo(c.html);
}
</script>
</body>
</html>
